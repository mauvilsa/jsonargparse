name: manual

on:
  workflow_dispatch:
    inputs:
      OS:
        description: Operating System
        required: true
        type: choice
        options:
        - windows-latest
        - macos-latest
        - ubuntu-latest

permissions:
  contents: read

env:
  # Only resolve distributions published at least one week ago, reducing the
  # chance of installing packages affected by undetected supply chain attacks
  UV_EXCLUDE_NEWER: 7 days
  # Make uv pip install into the python provided by setup-python
  UV_SYSTEM_PYTHON: 1

jobs:
  tox-coverage:
    runs-on: ${{ inputs.OS }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
            3.14
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          cache-suffix: tox-coverage
          cache-dependency-glob: pyproject.toml
      - run: uv pip install -e ".[dev]"
      - run: tox -- --cov=../jsonargparse --cov-append
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage
          path: jsonargparse_tests/.coverage
          include-hidden-files: true
          if-no-files-found: error
